name: Publish Flux Core Package

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'Dockerfile'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Flux Engine Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flux-engine:latest
            ghcr.io/${{ github.repository_owner }}/flux-engine:${{ github.sha }}
