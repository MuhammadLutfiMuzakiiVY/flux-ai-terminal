name: Flux AI Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Build Core
      run: cargo build --verbose --manifest-path core/Cargo.toml

    - name: Run Tests
      run: cargo test --verbose --manifest-path core/Cargo.toml

    - name: Check Formatting
      run: cargo fmt --all -- --check --manifest-path core/Cargo.toml

    - name: Security Audit
      run: cargo clippy -- -D warnings --manifest-path core/Cargo.toml
